name: CI/CD Pipeline - Deploy Quote Generator

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20.x'

jobs:
  # Job 1: Terraform Infrastructure
  terraform:
    name: 'Terraform Infrastructure'
    runs-on: ubuntu-latest
    outputs:
      instance_ip: ${{ steps.terraform-output.outputs.instance_ip }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0
          terraform_wrapper: false
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Format Check
        run: terraform fmt -check
        continue-on-error: true
      
      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan -out=tfplan
        env:
          TF_VAR_key_name: ${{ secrets.AWS_KEY_NAME }}
      
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
      
      - name: Get Terraform Outputs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: terraform-output
        run: |
          INSTANCE_IP=$(terraform output -raw instance_public_ip)
          echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT
          echo "Instance IP: $INSTANCE_IP"
  
  # Job 2: Build and Test Application
  build:
    name: 'Build & Test Application'
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Dependencies
        run: npm ci
      
      - name: Run Tests (if any)
        run: npm test
        continue-on-error: true
      
      - name: Create Deployment Package
        run: |
          mkdir -p deploy
          cp -r public server.js package*.json deploy/
          tar -czf deployment.tar.gz -C deploy .
      
      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment.tar.gz
          retention-days: 1
  
  # Job 3: Deploy to EC2
  deploy:
    name: 'Deploy to EC2'
    runs-on: ubuntu-latest
    needs: [terraform, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
      
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ needs.terraform.outputs.instance_ip }} >> ~/.ssh/known_hosts
      
      - name: Wait for EC2 Instance to be Ready
        run: |
          echo "Waiting for EC2 instance to be fully ready..."
          sleep 60
      
      - name: Copy Files to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            deployment.tar.gz \
            ubuntu@${{ needs.terraform.outputs.instance_ip }}:/tmp/
      
      - name: Deploy Application on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ needs.terraform.outputs.instance_ip }} << 'ENDSSH'
          
          # Stop existing application if running
          sudo systemctl stop quote-app || true
          
          # Extract deployment package
          sudo rm -rf /var/www/app/*
          sudo tar -xzf /tmp/deployment.tar.gz -C /var/www/app/
          sudo chown -R ubuntu:ubuntu /var/www/app
          
          # Install dependencies
          cd /var/www/app
          npm install --production
          
          # Create systemd service file
          sudo tee /etc/systemd/system/quote-app.service > /dev/null << 'EOF'
          [Unit]
          Description=Quote Generator Application
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/var/www/app
          ExecStart=/usr/bin/node server.js
          Restart=always
          RestartSec=10
          Environment=NODE_ENV=production
          Environment=PORT=3000
          StandardOutput=syslog
          StandardError=syslog
          SyslogIdentifier=quote-app
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Reload systemd and start service
          sudo systemctl daemon-reload
          sudo systemctl enable quote-app
          sudo systemctl start quote-app
          
          # Wait for app to start
          sleep 5
          
          # Configure Nginx
          sudo tee /etc/nginx/sites-available/quote-app > /dev/null << 'EOF'
          server {
              listen 80;
              listen [::]:80;
              server_name _;
              
              access_log /var/log/nginx/quote-app-access.log;
              error_log /var/log/nginx/quote-app-error.log;
              
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
                  proxy_cache_bypass \$http_upgrade;
              }
              
              location /api/health {
                  proxy_pass http://localhost:3000/api/health;
                  access_log off;
              }
          }
          EOF
          
          # Enable Nginx site
          sudo ln -sf /etc/nginx/sites-available/quote-app /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          
          # Test and reload Nginx
          sudo nginx -t
          sudo systemctl reload nginx
          
          # Cleanup
          rm /tmp/deployment.tar.gz
          
          echo "Deployment completed successfully!"
          ENDSSH
      
      - name: Health Check
        run: |
          echo "Running health check..."
          sleep 10
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://${{ needs.terraform.outputs.instance_ip }}/api/health)
          
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Health check passed! Application is running."
          else
            echo "❌ Health check failed with status code: $RESPONSE"
            exit 1
          fi
      
      - name: Display Deployment Info
        run: |
          echo "=========================================="
          echo "🎉 Deployment Successful!"
          echo "=========================================="
          echo "Application URL: http://${{ needs.terraform.outputs.instance_ip }}"
          echo "Health Check: http://${{ needs.terraform.outputs.instance_ip }}/api/health"
          echo "=========================================="